<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Chińczyk Online</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

#menu{
    position:absolute;
    right:40px;
    top:180px;
    width:320px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

input{
    height:60px;
    border:none;
    border-radius:12px;
    padding-left:18px;
    font-size:22px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:22px;
    background:#5f5f5f;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#777;
}

#roomBox{
    position:absolute;
	
    left:20px;
    top:20px;
    color:white;
    display:block;
}

#playersList{
    margin-top:10px;
    font-size:22px;
}

#startBtn{
    margin-top:15px;
	
    width:200px;
    display:none;
}

</style>
</head>

<body>

<div id="roomBox">

    <h1 id="roomTitle"></h1>

    <div id="playersList"></div>
<h2>AKTYWNE POKOJE</h2>

<div id="roomsList"
     style="pointer-events:auto">
</div>
<div style="color:lime;font-size:30px">
ROOMS ACTIVE
</div>
    <button id="startBtn"
        onclick="startOnlineGame()">
        START
    </button>

</div>

<div id="menu">

    <input
        id="nick"
        placeholder="Twój nick"
        value="Gacek"
    >

    <button onclick="createRoom()">
        ZAŁÓŻ POKÓJ
    </button>

    <input
        id="roomInput"
        placeholder="Kod pokoju"
    >

    <button onclick="joinRoom()">
        DOŁĄCZ DO POKOJU
    </button>

</div>
<canvas id="game"></canvas>

<canvas id="diceCanvas"
style="
position:absolute;
right:40px;
bottom:40px;
background:black;
border-radius:12px;
">
</canvas>

<div id="info"
style="
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:28px;
z-index:10;
">
</div>

<button id="rollBtn"
onclick="rollDice()"
style="
position:absolute;
right:40px;
bottom:200px;
width:140px;
display:none;
z-index:10;
">
RZUĆ
</button>

<select id="players" style="display:none">
<option>2</option>
<option>3</option>
<option selected>4</option>
</select>

<div id="inputs" style="display:none"></div>
<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let myRoom = null;
let isAdmin = false;

function createRoom(){

    const nick =
        document.getElementById("nick").value;

    socket.emit("createRoom", nick);
}

function joinRoom(){

    const nick =
        document.getElementById("nick").value;

    const roomId =
        document.getElementById("roomInput")
        .value
        .toUpperCase();

    socket.emit("joinRoom", {
        nick,
        roomId
    });
}
function quickJoin(roomId){

    const nick =
        document.getElementById("nick").value || "Gracz";

    socket.emit("joinRoom", {
        nick,
        roomId
    });
}

function renderPlayers(players){

    const list =
        document.getElementById("playersList");

    list.innerHTML = "";

    players.forEach(p => {

        list.innerHTML += `
            <div>
                ${p.nick}
                ${p.admin ? " ⭐" : ""}
            </div>
        `;
    });
}

socket.on("connect", () => {

    console.log("SOCKET OK");
});

socket.on("roomCreated", data => {

    myRoom = data.roomId;

    isAdmin = true;

    document.getElementById("roomBox")
        .style.display = "block";

    document.getElementById("roomTitle")
        .innerHTML =
        "POKÓJ: " + data.roomId;

    document.getElementById("startBtn")
        .style.display = "block";

    renderPlayers(data.players);
});

socket.on("roomUpdated", players => {

    renderPlayers(players);
});
socket.on("roomsList", rooms => {

    const div =
        document.getElementById("roomsList");

    div.innerHTML = "";

    rooms.forEach(room => {

        div.innerHTML += `

            <div style="
                margin-top:10px;
                padding:10px;
                background:#111;
                border-radius:10px;
            ">

                <b>${room.roomId}</b>
                (${room.count}/4)

                <button
                    style="
                        margin-top:8px;
                        width:100%;
                    "
                    onclick="quickJoin('${room.roomId}')"
                >
                    DOŁĄCZ
                </button>

            </div>
        `;
    });
});

socket.on("joinError", msg => {

    alert(msg);
});

function startOnlineGame(){

    socket.emit(
        "startGame",
        myRoom
    );
}
socket.on("gameStarted", onlinePlayers => {

    console.log("GAME START");

    const menu =
        document.getElementById("menu");

    const roomBox =
        document.getElementById("roomBox");

    if (menu) {
        menu.style.display = "none";
    }

    if (roomBox) {
        roomBox.style.display = "none";
    }

    const game =
        document.getElementById("game");

    const dice =
        document.getElementById("diceCanvas");

    game.style.display = "block";
    dice.style.display = "block";

    players = [];

    onlinePlayers.forEach(p => {

        players.push({
            nick: p.nick,
            color: p.color
        });
    });

    currentTurn = 0;
    currentPlayer = players[0];

    startGame();
});

</script>
<script src="china.js"></script>
</body>


</html>
