<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Chińczyk Online</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

#menu{
    position:absolute;
    right:40px;
    top:180px;
    width:320px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

input{
    height:60px;
    border:none;
    border-radius:12px;
    padding-left:18px;
    font-size:22px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:22px;
    background:#5f5f5f;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#777;
}

#roomBox{
    position:absolute;
    left:20px;
    top:20px;
    color:white;
    display:none;
}

#playersList{
    margin-top:10px;
    font-size:22px;
}

#startBtn{
    margin-top:15px;
    width:200px;
    display:none;
}

</style>
</head>

<body>

<div id="roomBox">

    <h1 id="roomTitle"></h1>

    <div id="playersList"></div>

    <button id="startBtn"
        onclick="startOnlineGame()">
        START
    </button>

</div>

<div id="menu">

    <input
        id="nick"
        placeholder="Twój nick"
        value="Gacek"
    >

    <button onclick="createRoom()">
        ZAŁÓŻ POKÓJ
    </button>

    <input
        id="roomInput"
        placeholder="Kod pokoju"
    >

    <button onclick="joinRoom()">
        DOŁĄCZ DO POKOJU
    </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let myRoom = null;
let isAdmin = false;

function createRoom(){

    const nick =
        document.getElementById("nick").value;

    socket.emit("createRoom", nick);
}

function joinRoom(){

    const nick =
        document.getElementById("nick").value;

    const roomId =
        document.getElementById("roomInput")
        .value
        .toUpperCase();

    socket.emit("joinRoom", {
        nick,
        roomId
    });
}

function renderPlayers(players){

    const list =
        document.getElementById("playersList");

    list.innerHTML = "";

    players.forEach(p => {

        list.innerHTML += `
            <div>
                ${p.nick}
                ${p.admin ? " ⭐" : ""}
            </div>
        `;
    });
}

socket.on("connect", () => {

    console.log("SOCKET OK");
});

socket.on("roomCreated", data => {

    myRoom = data.roomId;

    isAdmin = true;

    document.getElementById("roomBox")
        .style.display = "block";

    document.getElementById("roomTitle")
        .innerHTML =
        "POKÓJ: " + data.roomId;

    document.getElementById("startBtn")
        .style.display = "block";

    renderPlayers(data.players);
});

socket.on("roomUpdated", players => {

    renderPlayers(players);
});

socket.on("joinError", msg => {

    alert(msg);
});

function startOnlineGame(){

    alert("START GRY");
}

</script>

</body>
</html>
