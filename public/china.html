<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chińczyk Online</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

#game{
    position:absolute;
    left:0;
    top:0;
}

#info{
    position:absolute;
    left:50%;
    top:20px;
    transform:translateX(-50%);
    color:white;
    font-size:30px;
    z-index:10;
    text-align:center;
}

#rollBtn{
    position:absolute;
    right:40px;
    bottom:200px;
    width:160px;
    height:70px;
    border:none;
    border-radius:14px;
    background:#666;
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:10;
    display:block;
}

#rollBtn:hover{
    background:#888;
}

#diceCanvas{
    position:absolute;
    right:40px;
    bottom:40px;
    width:140px;
    height:140px;
    background:black;
    border-radius:12px;
    z-index:10;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="info"></div>

<button id="rollBtn" onclick="rollDice()">
    RZUĆ
</button>

<canvas id="diceCanvas"></canvas>

<select id="players" style="display:none">
    <option>2</option>
    <option>3</option>
    <option selected>4</option>
</select>

<div id="inputs" style="display:none"></div>

<script src="china.js"></script>

</body>
</html>
