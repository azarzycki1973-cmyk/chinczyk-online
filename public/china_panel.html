<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chińczyk Online - Panel</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#main{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
}

.panel{
    width:260px;
    background:#111;
    border-radius:20px;
    padding:14px;
    box-sizing:border-box;
    border:2px solid #333;
}

h1{
    margin-top:0;
    text-align:center;
    font-size:24px;
}

h2{
    margin-top:0;
}

input,
select,
button{
    width:100%;
    height:36px;
    border:none;
    border-radius:12px;
    margin-top:12px;
    font-size:14px;
    box-sizing:border-box;
}

input,
select{
    padding-left:15px;
    background:#222;
    color:white;
}

button{
    background:#5a5a5a;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#777;
}

.room{
    margin-top:12px;
    background:#1b1b1b;
    border-radius:8px;
    padding:12px;
}

.roomTitle{
    font-size:12px;
    font-weight:bold;
}

.roomCount{
    margin-top:5px;
    color:#aaa;
}

#roomLobby{
    display:none;
}

.playerLine{
    margin-top:10px;
    padding:10px;
    background:#1d1d1d;
    border-radius:10px;
    font-size:14px;
}

.admin{
    color:gold;
}

#status{
    margin-top:15px;
    color:lime;
    font-size:20px;
    text-align:center;
}

</style>

</head>
<body>

<div id="main">

    <!-- ===== WYBÓR TRYBU ===== -->

    <div class="panel" id="modePanel">

        <h1>CHIŃCZYK</h1>

        <button onclick="showOfflineMenu()">
            OFFLINE
        </button>

        <button onclick="showOnlineMenu()">
            ONLINE
        </button>

    </div>



    <!-- ===== ONLINE ===== -->

    <div
        class="panel"
        id="onlinePanel"
        style="display:none"
    >

        <h1>ONLINE</h1>

        <div id="onlineMenu">

            <input
                id="onlineNick"
                placeholder="Twój nick"
                value="Gacek"
            >

            <button onclick="createRoom()">
                ZAŁÓŻ POKÓJ
            </button>

            <input
                id="roomInput"
                placeholder="Kod pokoju"
            >

            <button onclick="joinRoom()">
                DOŁĄCZ
            </button>

            <div id="status"></div>

            <h2 style="margin-top:25px">
                AKTYWNE POKOJE
            </h2>

            <div id="roomsList"></div>

        </div>

        <div id="roomLobby">

            <h2 id="roomTitle"></h2>

            <div id="playersList"></div>

            <button
                id="startBtn"
                onclick="startOnlineGame()"
                style="display:none"
            >
                START GRY
            </button>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let myRoom = null;
let isAdmin = false;

// ===== MENU =====

function showOfflineMenu(){

    location.href = "china_game_off.html";
}

function showOnlineMenu(){

    document.getElementById("modePanel")
        .style.display = "none";

    document.getElementById("onlinePanel")
        .style.display = "block";
}

// ===== OFFLINE =====

function startOfflineGame(){

    localStorage.setItem(
        "china_mode",
        "offline"
    );

    const nick =
        document.getElementById("offlineNick")
        .value || "Gracz";

    const playerCount = parseInt(
        document.getElementById("offlinePlayers")
        .value
    );

    const COLORS = [
        "RED",
        "BLUE",
        "GREEN",
        "YELLOW"
    ];

    const players = [];

    players.push({
        nick,
        color:"RED",
        ai:false
    });

    for(let i = 1; i < playerCount; i++){

        players.push({
            nick:"Gracz " + (i + 1),
            color:COLORS[i],
            ai:false
        });
    }

    while(players.length < 4){

        const color = COLORS[players.length];

        players.push({
            nick:"AI " + color,
            color,
            ai:true
        });
    }

    localStorage.setItem(
        "china_players",
        JSON.stringify({
            mode:"offline",
            players
        })
    );

    location.href = "china_game_off.html";
}

// ===== ONLINE =====

function createRoom(){

    const nick =
        document.getElementById("onlineNick")
        .value || "Gracz";

    socket.emit("createRoom", nick);
}

function joinRoom(){

    const nick =
        document.getElementById("onlineNick")
        .value || "Gracz";

    const roomId =
        document.getElementById("roomInput")
        .value
        .toUpperCase();
		myRoom = roomId;

    socket.emit("joinRoom", {
        nick,
        roomId
    });
}

function quickJoin(roomId){
myRoom = roomId;
    const nick =
        document.getElementById("onlineNick")
        .value || "Gracz";

    socket.emit("joinRoom", {
        nick,
        roomId
    });
}

function renderPlayers(players){

    const list =
        document.getElementById("playersList");

    list.innerHTML = "";

    players.forEach(p => {

        list.innerHTML += `
            <div class="playerLine">
                ${p.nick}
                ${p.admin ? '<span class="admin"> ⭐</span>' : ''}
            </div>
        `;
    });
}

socket.on("roomCreated", data => {

    myRoom = data.roomId;
    isAdmin = true;

    document.getElementById("onlineMenu")
        .style.display = "none";

    document.getElementById("roomLobby")
        .style.display = "block";

    document.getElementById("roomTitle")
        .innerHTML = "POKÓJ: " + data.roomId;

    document.getElementById("startBtn")
        .style.display = "block";

    renderPlayers(data.players);
});

socket.on("roomUpdated", players => {

    document.getElementById("roomLobby")
        .style.display = "block";

    document.getElementById("onlineMenu")
        .style.display = "none";

    renderPlayers(players);
});

socket.on("roomsList", rooms => {

    const div =
        document.getElementById("roomsList");

    div.innerHTML = "";

    rooms.forEach(room => {

        div.innerHTML += `

            <div class="room">

                <div class="roomTitle">
                    ${room.roomId}
                </div>

                <div class="roomCount">
                    GRACZE: ${room.count}/4
                </div>

                <button
                    onclick="quickJoin('${room.roomId}')"
                >
                    DOŁĄCZ
                </button>

            </div>
        `;
    });
});

socket.on("joinError", msg => {

    document.getElementById("status")
        .innerHTML = msg;
});

function startOnlineGame(){

    socket.emit(
        "startGame",
        myRoom
    );
}

socket.on("gameStarted", onlinePlayers => {

    localStorage.setItem(
        "china_mode",
        "online"
    );

    localStorage.setItem(
        "china_config",
        JSON.stringify({
    mode:"online",
    roomId:myRoom,
    nick:
        document.getElementById(
            "onlineNick"
        ).value,
    players:onlinePlayers
})
    );

    location.href = "china_game_on.html";
});

socket.on("peerJoined", async data => {

    console.log(
        "PEER JOINED EVENT:",
        data.peerId
    );

    if(isAdmin){

        await startCall();
    }
});

</script>
<!-- ===== VIDEO CHAT ===== -->

<div id="videoBox"
style="
position:fixed;
right:10px;
bottom:10px;
z-index:999;
display:flex;
gap:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:12px;
">

    <video
        id="localVideo"
        autoplay
        muted
        playsinline
        style="
        width:180px;
        height:120px;
        background:black;
        border-radius:10px;
        object-fit:cover;
        "
    ></video>

    <video
        id="remoteVideo"
        autoplay
        playsinline
        style="
        width:180px;
        height:120px;
        background:black;
        border-radius:10px;
        object-fit:cover;
        "
    ></video>

</div>

<script>

let localStream = null;
let peerConnection = null;

const localVideo =
    document.getElementById("localVideo");

const remoteVideo =
    document.getElementById("remoteVideo");

const rtcConfig = {
    iceServers: [
        {
            urls: "stun:stun.l.google.com:19302"
        }
    ]
};

async function startMedia(){

    try{

        localStream =
            await navigator.mediaDevices
            .getUserMedia({
                video:true,
                audio:true
            });

        localVideo.srcObject = localStream;
console.log(
    "LOCAL VIDEO OK"
);
        console.log("MEDIA OK");

    }catch(err){

        console.log(
            "MEDIA ERROR:",
            err
        );
    }
}

async function createPeer(){

    peerConnection =
        new RTCPeerConnection(rtcConfig);

    localStream
        .getTracks()
        .forEach(track => {

            peerConnection.addTrack(
                track,
                localStream
            );
        });

    peerConnection.ontrack = event => {

        remoteVideo.srcObject =
            event.streams[0];
    };

    peerConnection.onicecandidate = event => {

        if(event.candidate){

            socket.emit(
                "iceCandidate",
                {
                    roomId: myRoom,
                    candidate: event.candidate
                }
            );
        }
    };
}

// ===== HOST START =====

async function startCall(){

    await startMedia();

    await createPeer();
	console.log(
    "PEER CREATED"
);

    const offer =
        await peerConnection
        .createOffer();

    await peerConnection
        .setLocalDescription(offer);

    socket.emit(
        "offer",
        {
            roomId: myRoom,
            offer
        }
    );
}

// ===== RECEIVE OFFER =====

socket.on("offer", async data => {

    console.log("OFFER RECEIVED");

    await startMedia();

    await createPeer();

    await peerConnection
        .setRemoteDescription(
            new RTCSessionDescription(
                data.offer
            )
        );

    const answer =
        await peerConnection
        .createAnswer();

    await peerConnection
        .setLocalDescription(answer);

    socket.emit(
        "answer",
        {
            roomId: myRoom,
            answer
        }
    );
});

// ===== RECEIVE ANSWER =====

socket.on("answer", async data => {

    console.log("ANSWER RECEIVED");

    await peerConnection
        .setRemoteDescription(
            new RTCSessionDescription(
                data.answer
            )
        );
});

// ===== ICE =====

socket.on("iceCandidate", async data => {

    try{

        await peerConnection
            .addIceCandidate(
                new RTCIceCandidate(
                    data.candidate
                )
            );

    }catch(err){

        console.log(
            "ICE ERROR:",
            err
        );
    }
});

</script>
</body>
</html>
