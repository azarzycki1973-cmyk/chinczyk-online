<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chińczyk</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

#game{
    position:absolute;
    left:0;
    top:0;
}

#info{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:34px;
    font-weight:bold;
    z-index:50;
    text-align:center;
    width:100%;
    text-shadow:0 0 10px black;
    pointer-events:none;
}

#rollBtn{
    position:absolute;
    right:40px;
    bottom:200px;
    width:170px;
    height:80px;
    border:none;
    border-radius:16px;
    background:#666;
    color:white;
    font-size:30px;
    cursor:pointer;
    z-index:50;
}

#rollBtn:hover{
    background:#888;
}

#diceCanvas{
    position:absolute;
    right:40px;
    bottom:40px;
    width:140px;
    height:140px;
    z-index:50;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="info"></div>

<button id="rollBtn"
onclick="rollDice()">
RZUĆ
</button>

<canvas id="diceCanvas"></canvas>

<select id="players"
style="display:none">
<option>2</option>
<option>3</option>
<option selected>4</option>
</select>

<div id="inputs"
style="display:none"></div>

<script src="china.js"></script>

</body>
</html>
